name: Daily Pink Sheet Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '15 6 * * *'

permissions:
  contents: write

jobs:
  pink-sheet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup renv cache
        uses: r-lib/actions/setup-renv@v2

      - name: Restore renv library
        run: Rscript -e 'if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv", repos = "https://cloud.r-project.org"); renv::restore(prompt = FALSE)'

      - name: Fetch latest workbook
        run: Rscript scripts/fetch_data.R

      - name: Process workbook
        run: Rscript scripts/process_data.R

      - name: Generate plot
        run: Rscript scripts/make_plot.R

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto site
        run: quarto render

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add data/raw data/processed docs logs _quarto.yml scripts/make_plot.R renv.lock
            git commit -m "chore: refresh pink sheet data"
            git push
          else
            echo "No changes to commit"
          fi
